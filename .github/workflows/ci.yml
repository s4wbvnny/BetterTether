name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: macos-14  # Apple Silicon runner (M1)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies (libusb + pkg-config)
        run: brew install libusb pkg-config

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: make build
        env:
          CGO_ENABLED: 1
          GOARCH: arm64
          GOOS: darwin